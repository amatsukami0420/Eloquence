<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Eloquence</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="bg-dark d-flex flex-column">
    <main class="container d-flex align-items-center justify-content-center py-5">
      <div
        class="card border-0 shadow-lg p-4"
        style="max-width: 440px; width: 100%"
      >
        <div class="text-center mb-4">
          <h3 class="fw-bold text-uppercase">
            <span class="text-warning">Elo</span>quence
          </h3>
        </div>

        <ul class="nav nav-pills nav-justified mb-4" id="loginTabs" role="tablist">
          <li class="nav-item" role="presentation">
            <button
              class="nav-link active"
              id="signin-tab"
              data-bs-toggle="pill"
              data-bs-target="#signIn"
              type="button"
              role="tab"
              aria-controls="signIn"
              aria-selected="true"
            >
              Sign In
            </button>
          </li>
          <li class="nav-item" role="presentation">
            <button
              class="nav-link"
              id="register-tab"
              data-bs-toggle="pill"
              data-bs-target="#register"
              type="button"
              role="tab"
              aria-controls="register"
              aria-selected="false"
            >
              Register
            </button>
          </li>
        </ul>

        <div class="tab-content">
          <div class="tab-pane fade show active" id="signIn" role="tabpanel" aria-labelledby="signin-tab" tabindex="0">
            <div class="form-floating mb-3">
              <input
                type="email"
                class="form-control"
                id="loginEmail"
                placeholder="name@example.com"
              /><label for="loginEmail">Email address</label>
            </div>
            <div class="form-floating mb-4">
              <input
                type="password"
                class="form-control"
                id="loginPass"
                placeholder="Password"
              /><label for="loginPass">Password</label>
            </div>
            <a href="index.html" class="btn btn-dark w-100 py-2 fw-bold">
              Enter the Grid
            </a>
          </div>

          <div class="tab-pane fade" id="register" role="tabpanel" aria-labelledby="register-tab" tabindex="0">
            <div class="form-floating mb-3">
              <input
                type="text"
                class="form-control"
                id="registerName"
                placeholder="Full Name"
              /><label for="registerName">Full Name</label>
            </div>
            <div class="form-floating mb-3">
              <input
                type="email"
                class="form-control"
                id="registerEmail"
                placeholder="name@example.com"
              /><label for="registerEmail">Email address</label>
            </div>
            <div class="form-floating mb-3">
              <input
                type="password"
                class="form-control"
                id="registerPass"
                placeholder="Password"
              /><label for="registerPass">Password</label>
            </div>
            <div class="form-floating mb-4">
              <input
                type="password"
                class="form-control"
                id="registerConfirm"
                placeholder="Confirm Password"
              /><label for="registerConfirm">Confirm Password</label>
            </div>
            <a href="index.html" class="btn btn-warning w-100 py-2 fw-bold text-uppercase">
              Create Account
            </a>
          </div>
        </div>
      </div>
    </main>
    <footer class="bg-dark text-secondary text-center py-4 mt-auto shadow-lg">
      <div class="container">
        <p class="mb-0 small fw-semibold">
          &copy; 2026 ELOQUENCE. ENGINEERED FOR THE 64 SQUARES. Muhammad Waleed,
          FA24-BCS-110. All rights reserved.
        </p>
      </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
